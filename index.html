let grammarQuizState = null;
function startGrammarQuiz(id) {
  const g = GRAMMAR_LESSONS.find(x => x.id === id);
  if (!g) return;
  grammarQuizState = { g, idx: 0, correct: 0, answered: false, lastAnswer: -1 };
  renderGrammarQuiz();
}

function renderGrammarQuiz() {
  const s = grammarQuizState;
  if (!s) return;
  const q = s.g.quiz[s.idx];
  const choicesHtml = q.choices.map((c, i) => {
    let cls = 'choice';
    if (s.answered) {
      if (i === q.answer) cls += ' correct';
      else if (i === s.lastAnswer) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="answerGrammarQuiz(${i})" ${s.answered ? 'disabled' : ''}>
      <span class="choice-num">${i+1}</span><span>${escapeHtml(c)}</span>
    </button>`;
  }).join('');
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px">
      <button class="close-btn" onclick="nav('grammar-detail')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="progress-bar"><div class="progress-fill" style="width:${(s.idx / s.g.quiz.length) * 100}%"></div></div>
      <span style="font-weight:700; font-size:14px">${s.idx + 1}/${s.g.quiz.length}</span>
    </div>
    <h3 style="margin-bottom:6px">${escapeHtml(s.g.title)}</h3>
    <div class="question">
      <div class="question-hint">QUIZ</div>
      <div class="question-prompt">${escapeHtml(q.q)}</div>
    </div>
    <div class="choices">${choicesHtml}</div>
    ${s.answered ? `<button class="btn" onclick="nextGrammarQuiz()">${s.idx + 1 < s.g.quiz.length ? '다음 →' : '결과 보기'}</button>` : ''}
  `;
}

function answerGrammarQuiz(i) {
  const s = grammarQuizState;
  if (!s || s.answered) return;
  const q = s.g.quiz[s.idx];
  s.answered = true;
  s.lastAnswer = i;
  if (i === q.answer) s.correct++;
  renderGrammarQuiz();
}

function nextGrammarQuiz() {
  const s = grammarQuizState;
  if (s.idx + 1 < s.g.quiz.length) {
    s.idx++;
    s.answered = false;
    s.lastAnswer = -1;
    renderGrammarQuiz();
  } else {
    // 결과
    const pct = Math.round((s.correct / s.g.quiz.length) * 100);
    const passed = s.correct >= Math.ceil(s.g.quiz.length * 0.66);
    state.grammarProgress[s.g.id] = state.grammarProgress[s.g.id] || {};
    state.grammarProgress[s.g.id].score = pct;
    state.grammarProgress[s.g.id].lastReview = Date.now();
    if (passed) state.grammarProgress[s.g.id].mastered = true;
    if (passed) { state.stats.xp += 15; state.stats.gems = (state.stats.gems||0) + 1; }
    saveState();
    document.getElementById('main').innerHTML = `
      <div style="text-align:center; padding: 40px 16px">
        <div style="font-size:72px; margin-bottom:14px">${passed ? '🎉' : '😅'}</div>
        <h2 style="margin-bottom:8px">${passed ? '마스터!' : '조금 더 연습해요'}</h2>
        <p class="subtitle" style="margin-bottom:24px">${s.correct} / ${s.g.quiz.length} 정답 (${pct}%)</p>
        ${passed ? '<p style="color:var(--accent); font-weight:700">+15 XP · +1 💎</p>' : ''}
        <div style="display:flex; gap:10px; margin-top:24px">
          <button class="btn btn-ghost" onclick="nav('grammar-detail')">다시 보기</button>
          <button class="btn" onclick="nav('grammar')">목록으로</button>
        </div>
      </div>
    `;
    if (passed) burstConfetti();
  }
}

  { id: 's1', level: 'A1', pairs: 4, label: '입문 (8장)', source: 'u1' },

  { id: 's4', level: 'A1', pairs: 6, label: '도전 (12장)', source: 'u4' },
  { id: 's5', level: 'A1', pairs: 8, label: '심화 (16장)', source: 'u5' },
  { id: 's6', level: 'A1', pairs: 8, label: '복습 (16장)', source: 'mixed' },
  { id: 's7', level: 'A2', pairs: 6, label: 'A2 입문', source: 'saved' },
  { id: 's8', level: 'A2', pairs: 8, label: 'A2 도전', source: 'saved' },
  { id: 's9', level: 'A2', pairs: 10, label: 'A2 마스터 (20장)', source: 'saved' }
];

function renderWordGame() {
  const stagesHtml = WORD_GAME_STAGES.map((st, i) => {
    const prev = i === 0 ? null : WORD_GAME_STAGES[i-1];
    const unlocked = i === 0 || (prev && state.wordGame.stagesCleared[prev.id]);

  }).join('');

  const totalStars = Object.values(state.wordGame.stagesCleared).reduce((a,b) => a+b, 0);

    <h2 style="margin-bottom:6px">🎮 단어 매칭 게임</h2>

        <div><div style="font-size:24px; font-weight:700">${state.wordGame.totalPlays || 0}</div><div style="font-size:12px; color:var(--ink-soft)">총 게임</div></div>

    </div>

let wgState = null;
function startWordGame(stageId) {
  const st = WORD_GAME_STAGES.find(s => s.id === stageId);
  if (!st) return;
  let words = [];
  if (st.source === 'mixed') {
    words = UNITS.flatMap(u => u.vocab);
  } else if (st.source === 'saved') {
    const saved = (state.savedWords || []).map(s => ({ en: s.word, ko: s.ko || s.definition?.slice(0,15) || s.word }));
    const fallback = UNITS.flatMap(u => u.vocab);
    words = saved.length >= st.pairs ? saved : [...saved, ...fallback];
  } else {
    const unit = UNITS.find(u => u.id === st.source);
    words = unit ? unit.vocab : UNITS[0].vocab;
  }
  // 짧은 것 우선
  const picked = words.filter(w => w.en && w.ko).sort(() => Math.random() - 0.5).slice(0, st.pairs);
  const cards = [];
  picked.forEach((w, i) => {
    cards.push({ id: `${i}-en`, pairId: i, text: w.en, lang: 'en', revealed: false, matched: false });
    cards.push({ id: `${i}-ko`, pairId: i, text: w.ko, lang: 'ko', revealed: false, matched: false });
  });
  // 셔플
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  wgState = {
    stage: st,
    cards,
    revealedIdx: [],
    matches: 0,
    moves: 0,
    startTs: Date.now(),
    locked: false,
    finished: false
  };
  activeScreen = 'wordgame-play';
  render();
}

function renderWordGamePlay() {
  if (!wgState) return nav('wordgame');
  const s = wgState;
  const elapsed = Math.floor((Date.now() - s.startTs) / 1000);
  const cols = s.cards.length <= 8 ? 4 : (s.cards.length <= 16 ? 4 : 5);
  const cardsHtml = s.cards.map((c, i) => {
    const show = c.revealed || c.matched;
    const cls = `match-card ${c.matched ? 'matched' : (c.revealed ? 'revealed' : '')}`;
    const txt = show ? escapeHtml(c.text) : '?';
    return `<button class="${cls}" onclick="flipCard(${i})" ${s.locked || c.matched || c.revealed ? 'disabled' : ''}>${txt}</button>`;
  }).join('');
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px">
      <button class="close-btn" onclick="if(confirm('게임을 그만둘까요?')) nav('wordgame')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <h3 style="flex:1">${escapeHtml(s.stage.label)}</h3>
    </div>
    <div class="game-hud">
      <div class="item"><div class="label">매칭</div><div class="value">${s.matches}/${s.stage.pairs}</div></div>
      <div class="item"><div class="label">시도</div><div class="value">${s.moves}</div></div>
      <div class="item"><div class="label">시간</div><div class="value" id="wg-timer">${elapsed}s</div></div>
    </div>
    <div class="match-grid" style="grid-template-columns: repeat(${cols}, 1fr)">${cardsHtml}</div>
  `;
  // 타이머
  if (s._timer) clearInterval(s._timer);
  s._timer = setInterval(() => {
    const el = document.getElementById('wg-timer');
    if (!el || s.finished) { clearInterval(s._timer); return; }
    el.textContent = Math.floor((Date.now() - s.startTs) / 1000) + 's';
  }, 1000);
}

function flipCard(idx) {
  const s = wgState;
  if (!s || s.locked || s.finished) return;
  const c = s.cards[idx];
  if (c.matched || c.revealed) return;
  c.revealed = true;
  s.revealedIdx.push(idx);
  if (s.revealedIdx.length === 2) {
    s.moves++;
    s.locked = true;
    const [a, b] = s.revealedIdx.map(i => s.cards[i]);
    renderWordGamePlay();
    setTimeout(() => {
      if (a.pairId === b.pairId && a.lang !== b.lang) {
        a.matched = b.matched = true;
        s.matches++;
        if (s.matches === s.stage.pairs) {
          finishWordGame();
          return;
        }
      } else {
        a.revealed = b.revealed = false;
      }
      s.revealedIdx = [];
      s.locked = false;
      renderWordGamePlay();
    }, 900);
  } else {
    renderWordGamePlay();
  }
}

function finishWordGame() {
  const s = wgState;
  s.finished = true;
  if (s._timer) clearInterval(s._timer);
  const elapsed = Math.floor((Date.now() - s.startTs) / 1000);
  const pairs = s.stage.pairs;
  // 별 산정: 시도 횟수와 시간 기준
  const perfectMoves = pairs;
  let stars = 1;
  if (s.moves <= perfectMoves * 1.5 && elapsed <= pairs * 8) stars = 3;
  else if (s.moves <= perfectMoves * 2 && elapsed <= pairs * 12) stars = 2;

  const prev = state.wordGame.stagesCleared[s.stage.id] || 0;
  state.wordGame.stagesCleared[s.stage.id] = Math.max(prev, stars);
  state.wordGame.totalPlays = (state.wordGame.totalPlays || 0) + 1;
  const xpEarn = pairs * 5 * stars;
  const gemEarn = stars >= 3 ? 2 : (stars === 2 ? 1 : 0);
  state.stats.xp += xpEarn;
  state.stats.gems = (state.stats.gems || 0) + gemEarn;
  saveState();

  document.getElementById('main').innerHTML = `
    <div style="text-align:center; padding: 50px 16px">
      <div style="font-size:72px; margin-bottom:14px">🎉</div>
      <h2 style="margin-bottom:8px">스테이지 클리어!</h2>
      <div style="font-size:48px; margin: 14px 0">${'⭐'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>
      <p style="font-size:14px; color:var(--ink-soft); margin-bottom:18px">
        시도 ${s.moves}회 · ${elapsed}초
      </p>
      <div style="background:var(--accent-soft); border:2px solid var(--accent); border-radius:14px; padding:16px; margin: 0 0 24px">
        <div style="font-size:14px; color:var(--accent-dark); font-weight:700">획득 보상</div>
        <div style="font-size:22px; font-weight:700; margin-top:4px">+${xpEarn} XP${gemEarn ? ` · +${gemEarn} 💎` : ''}</div>
      </div>
      <div style="display:flex; gap:10px">
        <button class="btn btn-ghost" onclick="startWordGame('${s.stage.id}')">다시 도전</button>
        <button class="btn" onclick="nav('wordgame')">스테이지 목록</button>
      </div>
    </div>
  `;
  burstConfetti();
}

function curBook() { return BIBLE_BOOKS[state.bible.cursor.bookIdx] || BIBLE_BOOKS[0]; }
function curRef() {
  const [name] = curBook();
  const c = state.bible.cursor;
  const end = c.verse + VERSES_PER_DAY - 1;
  return `${name} ${c.chapter}:${c.verse}-${end}`;
}

  const [, ko] = curBook();

}
function bibleGatewayUrl(ref, version = 'NIV') {
  return `https://www.biblegateway.com/passage/?search=${encodeURIComponent(ref)}&version=${version}`;

// 다음 3구절로 이동 — fetch 결과(실제 verse 수)를 보고 챕터/책 전환
function advanceCursor(fetchedVerses) {
  const c = state.bible.cursor;
  if (!fetchedVerses || fetchedVerses.length === 0) {
    // 빈 응답 — 다음 장으로
    rollChapter();
    return;
  }
  if (fetchedVerses.length < VERSES_PER_DAY) {
    // 장이 끝남 — 다음 장
    rollChapter();
  } else {
    // 정상 — 3절 뒤로
    const last = fetchedVerses[fetchedVerses.length - 1];
    c.verse = last.verse + 1;
  }
  saveState();
}

function rollChapter() {
  const c = state.bible.cursor;
  const [, , chapters] = curBook();
  c.chapter += 1;
  c.verse = 1;
  if (c.chapter > chapters) {
    c.bookIdx += 1;
    c.chapter = 1;
    if (c.bookIdx >= BIBLE_BOOKS.length) {
      c.bookIdx = 0; // 처음부터 다시
    }
  }
  saveState();
}

async function fetchPassage(ref) {
  const cache = state.bible.verseCache || {};
  if (cache[ref]) return cache[ref];
  try {
    const url = `https://bible-api.com/${encodeURIComponent(ref)}?translation=web`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API ' + res.status);
    const data = await res.json();
    const result = {
      text: (data.text || '').trim(),
      verses: data.verses || [],
      translation: data.translation_name || 'World English Bible',
      fetchedAt: Date.now()
    };
    state.bible.verseCache = state.bible.verseCache || {};
    state.bible.verseCache[ref] = result;
    const keys = Object.keys(state.bible.verseCache);
    if (keys.length > 80) delete state.bible.verseCache[keys[0]];
    saveState();
    return result;
  } catch (e) {
    console.warn('fetchPassage failed', e);
    return null;
  }
}

function speakPassage() {
  const txt = document.getElementById('verse-text-slot')?.innerText;

function advanceToNext() {
  // 현재 fetch 결과를 기반으로 다음 위치 계산
  const ref = curRef();
  const cached = (state.bible.verseCache || {})[ref];
  advanceCursor(cached?.verses || []);
  renderBible();
}

function toggleSaveVerse(ref, refKo) {
  state.bible.savedVerses = state.bible.savedVerses || [];
  const i = state.bible.savedVerses.findIndex(s => s.ref === ref);
  if (i >= 0) {
    state.bible.savedVerses.splice(i, 1);
    toast('저장 해제');
  } else {
    state.bible.savedVerses.push({ ref, refKo, savedAt: Date.now() });
    toast('⭐ 저장했어요');
  }
  saveState();
  renderBible();
}

  ],
  "grammar": [
    { "title": "문법 포인트 제목 (한국어, 예: 'be 동사 - was/were 과거형')", "explain": "왜 이 표현이 이렇게 쓰였는지 영어 초급자도 이해할 수 있게 한국어로 2-3문장 설명", "quote": "본문에서 그 문법이 쓰인 영어 문구 인용" }
  ]
}

규칙:
- vocab은 본문에서 가장 학습 가치 있는 단어 5-8개. 너무 기본적인 a, the, and 등은 제외.
- grammar는 본문에서 실제로 사용된 문법 패턴 2-4개 골라서 설명 (예: 과거시제, 관계대명사, 수동태, 분사, 전치사구 등). 영어 초보자가 처음 배우는 입장이라 생각하고 친절하게.
- 응답은 반드시 valid JSON 한 객체만.`;
    const userMsg = `Passage reference: ${ref} (${refKo})\nFull text (WEB):\n${passage.text}\n\nIndividual verses:\n${passage.verses.map(v => `${v.verse}. ${v.text.trim()}`).join('\n')}`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    if (!res.ok) { slot.innerHTML = '<p style="color:var(--danger); text-align:center">API 오류 — 설정에서 키를 확인하세요</p>'; return; }
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    state.bible.explainCache[ref] = parsed;
    const keys = Object.keys(state.bible.explainCache);
    if (keys.length > 30) delete state.bible.explainCache[keys[0]];
    state.stats.xp += 15;
    saveState();
    renderTopbar();
    renderPassageExplain(parsed, ref);
  } catch (e) {
    console.error(e);
    slot.innerHTML = '<p style="color:var(--danger); text-align:center">풀이를 분석할 수 없었어요. 다시 시도해주세요.</p>';
  }
}

function renderPassageExplain(parsed, ref) {
  const slot = document.getElementById('verse-explain-slot');
  if (!slot) return;
  const savedLower = (state.savedWords || []).map(s => s.word.toLowerCase());
  const vocabHtml = (parsed.vocab || []).map(v => {
    const isSaved = savedLower.includes((v.word || '').toLowerCase());
    return `
      <div class="verse-vocab-item">
        <div class="word">${escapeHtml(v.word)}${v.pos ? `<div style="font-size:11px; color:var(--ink-muted); font-weight:600">${escapeHtml(v.pos)}</div>` : ''}</div>
        <div class="meaning">
          ${escapeHtml(v.ko || '')}
          ${v.example ? `<div style="font-size:12px; color:var(--ink-muted); margin-top:3px; font-style:italic">"${escapeHtml(v.example)}"</div>` : ''}
        </div>
        <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="saveBibleVocab('${escapeAttr(v.word)}','${escapeAttr(v.ko || '')}',this)">
          ${isSaved ? '✓ 저장' : '+ 저장'}
        </button>
      </div>
    `;
  }).join('');
  const grammarHtml = (parsed.grammar || []).map(g => `
    <div class="grammar-section" style="margin-bottom:10px">
      <h4 style="text-transform:none; letter-spacing:0; font-size:15px; color:var(--ink)">📐 ${escapeHtml(g.title || '')}</h4>
      ${g.quote ? `<div style="background:var(--bg-muted); padding:8px 12px; border-left:3px solid var(--blue); border-radius:6px; font-style:italic; margin: 6px 0; font-size:14px">"${escapeHtml(g.quote)}"</div>` : ''}
      <p style="line-height:1.6; font-size:14px">${escapeHtml(g.explain || '')}</p>
    </div>
  `).join('');
  const koreanWithBreaks = escapeHtml(parsed.korean || '').replace(/(\d+\))/g, '<br><strong style="color:var(--accent)">$1</strong>').replace(/^<br>/, '');
  slot.innerHTML = `
    <div class="card" style="margin-top:14px">
      <h3 style="font-family:var(--serif); margin-bottom:10px">📜 한국어 번역</h3>
      <p style="line-height:1.8">${koreanWithBreaks}</p>
    </div>
    <div class="card" style="margin-top:12px">
      <h3 style="font-family:var(--serif); margin-bottom:10px">💡 구절 풀이</h3>
      <p style="line-height:1.7">${escapeHtml(parsed.meaning || '')}</p>
      ${parsed.application ? `<div style="margin-top:14px; padding:12px; background:var(--accent-soft); border-radius:10px"><strong style="color:var(--accent-dark); font-size:13px">오늘의 적용</strong><p style="margin-top:4px; line-height:1.6">${escapeHtml(parsed.application)}</p></div>` : ''}
    </div>
    <div class="card" style="margin-top:12px; padding:0; overflow:hidden">
      <h3 style="font-family:var(--serif); padding:14px 16px 8px">🔑 핵심 어휘</h3>
      ${vocabHtml || '<p style="padding:14px; color:var(--ink-muted)">단어가 없어요</p>'}
    </div>
    <div class="card" style="margin-top:12px">
      <h3 style="font-family:var(--serif); margin-bottom:10px">🧩 문법 분석</h3>
      ${grammarHtml || '<p style="color:var(--ink-muted)">문법 포인트가 없어요</p>'}
    </div>
  `;
}

function saveBibleVocab(word, ko, btn) {
  state.savedWords = state.savedWords || [];
  const idx = state.savedWords.findIndex(s => s.word.toLowerCase() === word.toLowerCase());
  if (idx >= 0) {
    toast('이미 저장된 단어예요');
    if (btn) { btn.textContent = '✓ 저장'; btn.classList.add('saved'); }
    return;
  }
  state.savedWords.push({ word, ko, definition: ko, phonetic: '', savedAt: Date.now() });
  const key = word.toLowerCase();
  state.srs[key] = state.srs[key] || { interval: 1, ease: 2.5, repetitions: 0, nextReview: Date.now() };
  saveState();
  if (btn) { btn.textContent = '✓ 저장'; btn.classList.add('saved'); }
  toast(`⭐ "${word}" 단어장 추가`);
}

function renderBibleSaved() {
  const list = state.bible.savedVerses || [];
  const itemsHtml = list.length ? list.slice().reverse().map(s => `
    <div class="media-item" onclick="openSavedVerse('${escapeAttr(s.ref)}','${escapeAttr(s.refKo)}')">
      <div class="meta-row">
        <span class="level-tag">${escapeHtml(s.refKo)}</span>
        <span class="type-tag">${escapeHtml(s.ref)}</span>
      </div>
      <div class="desc">저장: ${new Date(s.savedAt).toLocaleDateString('ko-KR')}</div>
    </div>
  `).join('') : '<p style="text-align:center; color:var(--ink-muted); padding: 40px">아직 저장된 구절이 없어요</p>';
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px">
      <button class="close-btn" onclick="nav('bible')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h2 style="flex:1">⭐ 저장한 구절</h2>
    </div>
    ${itemsHtml}
  `;
}

let savedVerseContext = null;
async function openSavedVerse(ref, refKo) {
  savedVerseContext = { ref, refKo };
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px">
      <button class="close-btn" onclick="nav('bible-saved')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h3 style="flex:1">${escapeHtml(refKo)}</h3>
    </div>
    <div class="verse-card">
      <span class="verse-ref">${escapeHtml(refKo)}</span>
      <div class="verse-text" id="verse-text-slot">⏳ 불러오는 중...</div>
      <div class="verse-translation">— WEB · ${escapeHtml(ref)}</div>
    </div>
    <div id="verse-actions-slot"></div>
    <div id="verse-explain-slot"></div>
  `;
  const passage = await fetchPassage(ref);
  const slot = document.getElementById('verse-text-slot');
  if (slot && passage) {
    const versesHtml = passage.verses.map(v => `
      <div style="margin-bottom:10px"><sup style="color:var(--accent); font-weight:700; font-size:13px; margin-right:4px">${v.verse}</sup>${makeTappableText(v.text.trim())}</div>
    `).join('');
    slot.innerHTML = versesHtml || makeTappableText(passage.text);
  } else if (slot) {
    slot.innerHTML = '<span style="color:var(--danger)">불러오지 못함</span>';
  }
  const actionsSlot = document.getElementById('verse-actions-slot');
  actionsSlot.innerHTML = `
    <div class="verse-actions">
      <button class="primary" onclick="explainPassage('${escapeAttr(ref)}','${escapeAttr(refKo)}')">🤖 AI 풀이 (단어+문법)</button>
      <button onclick="window.open('${bibleGatewayUrl(ref)}','_blank')">📖 NIV 원문</button>
    </div>
  `;
}

/* ---------- INIT ---------- */
window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {/* file:// 일 땐 무시 */});
  }
  render();
});
</script>
</body>

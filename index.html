<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fef9f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lingo — 나만의 AI 영어 튜터</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #fef9f3;
    --bg-card: #ffffff;
    --bg-muted: #f5ede0;
    --ink: #1a1f2e;
    --ink-soft: #5a6478;
    --ink-muted: #94a3b8;
    --line: #e8dcc6;
    --line-strong: #d4c2a3;

    --accent: #ff6b3d;       /* coral - XP / primary */
    --accent-dark: #e55525;
    --accent-soft: #fff1eb;
    --success: #2dab66;      /* green - correct */
    --success-soft: #d8f5e3;
    --danger: #e63946;       /* red - hearts */
    --danger-soft: #fde8ea;
    --gold: #f4b942;         /* yellow - streak/gems */
    --gold-soft: #fff5da;
    --blue: #4a90d9;
    --blue-soft: #e3f0fc;
    --purple: #7c4dff;
    --purple-soft: #efe8ff;

    --serif: 'Fraunces', Georgia, serif;
    --sans: 'DM Sans', -apple-system, sans-serif;

    --r-sm: 10px;
    --r-md: 16px;
    --r-lg: 22px;
    --r-xl: 28px;

    --shadow-sm: 0 1px 0 rgba(26, 31, 46, 0.04), 0 2px 6px rgba(26, 31, 46, 0.04);
    --shadow-md: 0 2px 0 rgba(26, 31, 46, 0.06), 0 8px 20px rgba(26, 31, 46, 0.06);
    --shadow-btn: 0 4px 0 var(--accent-dark);
    --shadow-btn-active: 0 1px 0 var(--accent-dark);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
  }

  /* === Top status bar === */
  .topbar {
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .topbar.hidden { display: none; }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    font-size: 15px;
  }
  .stat-icon { width: 22px; height: 22px; }

  /* === Main content area === */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    -webkit-overflow-scrolling: touch;
  }

  /* === Bottom nav === */
  .bottomnav {
    display: flex;
    justify-content: space-around;
    border-top: 1px solid var(--line);
    background: var(--bg);
    padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    flex-shrink: 0;
  }
  .bottomnav.hidden { display: none; }
  .navbtn {
    background: none;
    border: none;
    padding: 6px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--ink-muted);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    transition: color 0.15s;
  }
  .navbtn svg { width: 26px; height: 26px; }
  .navbtn.active { color: var(--accent); }

  /* === Typography === */
  h1, h2, h3 { font-family: var(--serif); font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  h1 { font-size: 32px; line-height: 1.1; }
  h2 { font-size: 24px; line-height: 1.2; }
  h3 { font-size: 18px; line-height: 1.3; font-weight: 700; }

  .subtitle { color: var(--ink-soft); font-size: 15px; }

  /* === Buttons === */
  .btn {
    width: 100%;
    padding: 16px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--r-md);
    font-family: var(--sans);
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    box-shadow: var(--shadow-btn);
    transition: all 0.12s ease-out;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: var(--shadow-btn-active);
  }
  .btn:disabled {
    background: var(--bg-muted);
    color: var(--ink-muted);
    box-shadow: 0 4px 0 var(--line);
    cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    box-shadow: none;
    border: 2px solid var(--line-strong);
  }
  .btn-ghost:active:not(:disabled) { background: var(--bg-muted); transform: none; box-shadow: none; }
  .btn-success { background: var(--success); box-shadow: 0 4px 0 #208a4f; }
  .btn-success:active:not(:disabled) { box-shadow: 0 1px 0 #208a4f; }
  .btn-danger { background: var(--danger); box-shadow: 0 4px 0 #c12a36; }

  /* === Card === */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px;
    box-shadow: var(--shadow-sm);
  }

  /* === Onboarding === */
  .hero {
    text-align: center;
    padding: 30px 12px;
  }
  .hero-emoji { font-size: 80px; margin-bottom: 12px; }
  .hero h1 { font-size: 38px; margin-bottom: 8px; }
  .hero p { color: var(--ink-soft); font-size: 17px; margin: 6px 0 0; }

  .input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--line);
    border-radius: var(--r-md);
    font-family: var(--sans);
    font-size: 16px;
    background: var(--bg-card);
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .input:focus { outline: none; border-color: var(--accent); }

  /* === Assessment === */
  .progress-bar {
    height: 14px;
    background: var(--bg-muted);
    border-radius: 7px;
    overflow: hidden;
    flex: 1;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #ff8a5d 100%);
    border-radius: 7px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .question {
    margin: 20px 0 24px;
  }
  .question-prompt {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .question-hint { font-size: 13px; color: var(--ink-muted); letter-spacing: 0.05em; text-transform: uppercase; }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 24px 0;
  }
  .choice {
    padding: 16px 18px;
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-bottom-width: 4px;
    border-radius: var(--r-md);
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .choice:active { transform: translateY(2px); border-bottom-width: 2px; }
  .choice.selected { background: var(--blue-soft); border-color: var(--blue); color: #1e5790; }
  .choice.correct { background: var(--success-soft); border-color: var(--success); color: #166534; }
  .choice.wrong { background: var(--danger-soft); border-color: var(--danger); color: #991b1b; }
  .choice-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    background: var(--bg-muted);
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .choice.selected .choice-num { background: var(--blue); color: white; }
  .choice.correct .choice-num { background: var(--success); color: white; }
  .choice.wrong .choice-num { background: var(--danger); color: white; }

  /* === Feedback panel === */
  .feedback {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 540px;
    margin: 0 auto;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    background: var(--bg-card);
    border-top: 1px solid var(--line);
    box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.08);
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .feedback.correct { background: var(--success-soft); border-top-color: var(--success); }
  .feedback.wrong { background: var(--danger-soft); border-top-color: var(--danger); }
  .feedback-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .feedback.correct .feedback-title { color: #166534; }
  .feedback.wrong .feedback-title { color: #991b1b; }
  .feedback-detail { font-size: 14px; margin-bottom: 14px; line-height: 1.4; }

  /* === Home / Skill tree === */
  .greeting { font-family: var(--serif); font-size: 24px; margin: 4px 0 16px; font-weight: 500; }
  .greeting em { color: var(--accent); font-style: italic; font-weight: 700; }

  .unit { margin-bottom: 32px; }
  .unit-header {
    background: var(--accent);
    color: white;
    padding: 14px 20px;
    border-radius: var(--r-md);
    margin-bottom: 18px;
    box-shadow: 0 4px 0 var(--accent-dark);
  }
  .unit-header h3 { color: white; font-family: var(--serif); font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.9; }
  .unit-header h2 { color: white; font-family: var(--serif); font-size: 22px; margin-top: 2px; }

  .lessons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }
  .lesson-node {
    position: relative;
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--accent-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    font-size: 30px;
  }
  .lesson-node:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--accent-dark); }
  .lesson-node.locked { background: var(--bg-muted); color: var(--ink-muted); box-shadow: 0 6px 0 var(--line); cursor: not-allowed; }
  .lesson-node.done { background: var(--gold); box-shadow: 0 6px 0 #d49b1a; }
  .lesson-node.current::after {
    content: '시작';
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    border: 1px solid var(--accent);
    box-shadow: 0 2px 0 var(--accent);
    white-space: nowrap;
  }
  .lesson-offset-1 { margin-left: 50px; }
  .lesson-offset-2 { margin-left: 70px; }
  .lesson-offset-3 { margin-left: 50px; }
  .lesson-offset-4 { margin-left: 0; }
  .lesson-offset-5 { margin-left: -50px; }
  .lesson-offset-6 { margin-left: -70px; }
  .lesson-offset-7 { margin-left: -50px; }

  /* === Lesson screen === */
  .lesson-screen { padding: 0; }
  .lesson-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
  }
  .close-btn:active { background: var(--bg-muted); border-radius: 50%; }
  .lesson-body { padding: 24px 20px 140px; }

  .audio-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--blue);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 0 #2f74b8;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .audio-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #2f74b8; }
  .audio-btn svg { width: 28px; height: 28px; }
  .audio-btn.large { width: 96px; height: 96px; box-shadow: 0 6px 0 #2f74b8; }
  .audio-btn.large svg { width: 40px; height: 40px; }

  /* === Sentence assembly === */
  .sentence-builder {
    min-height: 100px;
    background: var(--bg-card);
    border: 2px dashed var(--line);
    border-radius: var(--r-md);
    padding: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
    margin: 16px 0;
  }
  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 0;
  }
  .word-token {
    padding: 10px 14px;
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-bottom-width: 4px;
    border-radius: 10px;
    font-weight: 500;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.1s;
  }
  .word-token:active { transform: translateY(2px); border-bottom-width: 2px; }
  .word-token.used { opacity: 0.3; pointer-events: none; }

  /* === Speaking === */
  .mic-btn {
    width: 110px;
    height: 110px;
    margin: 0 auto;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    box-shadow: 0 6px 0 var(--accent-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .mic-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--accent-dark); }
  .mic-btn.recording { background: var(--danger); box-shadow: 0 6px 0 #c12a36; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .mic-btn svg { width: 44px; height: 44px; }

  /* === AI Chat === */
  .chat-msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    margin-bottom: 10px;
    line-height: 1.4;
    word-wrap: break-word;
  }
  .chat-msg.bot {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user {
    background: var(--accent);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    margin-left: auto;
  }
  .chat-msg .translation {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }
  .chat-msg.user .translation { border-top-color: rgba(255,255,255,0.2); }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }
  .chat-input-row .input { flex: 1; }
  .chat-input-row button {
    background: var(--accent);
    color: white;
    border: none;
    width: 48px;
    border-radius: var(--r-md);
    font-size: 20px;
    cursor: pointer;
  }

  /* === Profile / Stats === */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px;
    text-align: center;
  }
  .stat-card .big {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card .label { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-card.coral .big { color: var(--accent); }
  .stat-card.gold .big { color: var(--gold); }
  .stat-card.blue .big { color: var(--blue); }
  .stat-card.green .big { color: var(--success); }

  /* === Result screen === */
  .result-screen {
    text-align: center;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .result-emoji { font-size: 100px; margin-bottom: 16px; }
  .result-screen h1 { font-size: 36px; margin-bottom: 8px; }
  .result-stats {
    display: flex;
    gap: 12px;
    margin: 24px 0;
    width: 100%;
  }
  .result-stat {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px;
  }
  .result-stat-label { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
  .result-stat-value {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 700;
    margin-top: 4px;
  }
  .result-stat.xp .result-stat-value { color: var(--accent); }
  .result-stat.acc .result-stat-value { color: var(--success); }
  .result-stat.time .result-stat-value { color: var(--blue); }

  /* === Settings === */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row .label { font-weight: 500; }
  .settings-row .sub { font-size: 13px; color: var(--ink-soft); }

  /* Toast */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    animation: toastIn 0.3s ease-out;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* Loading dots */
  .dots { display: inline-flex; gap: 4px; }
  .dots span {
    width: 8px;
    height: 8px;
    background: var(--ink-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite both;
  }
  .dots span:nth-child(2) { animation-delay: 0.16s; }
  .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* === Word tap-to-define popup === */
  .define-overlay {
    position: fixed; inset: 0;
    background: rgba(26, 31, 46, 0.5);
    backdrop-filter: blur(2px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .define-card {
    width: 100%;
    max-width: 540px;
    background: var(--bg-card);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    padding: 22px 22px calc(22px + env(safe-area-inset-bottom));
    max-height: 75vh;
    overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .define-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 10px; }
  .define-word { font-family: var(--serif); font-size: 32px; font-weight: 700; line-height:1.1; }
  .define-phonetic { color: var(--ink-soft); font-size: 16px; margin-top: 2px; font-family: monospace; }
  .define-pos { display:inline-block; padding: 3px 10px; background: var(--purple-soft); color:var(--purple); border-radius: 6px; font-size:12px; font-weight: 700; margin: 8px 0 4px; text-transform: uppercase; letter-spacing:0.05em; }
  .define-meaning { margin: 4px 0 12px; line-height:1.5; }
  .define-example { padding-left: 12px; border-left: 3px solid var(--line-strong); color: var(--ink-soft); font-style: italic; margin-top: 6px; font-size:14px; }
  .define-actions { display:flex; gap:8px; margin-top: 16px; }
  .define-actions button { flex:1; padding: 12px; border:none; border-radius: var(--r-md); font-weight: 600; cursor:pointer; font-family: var(--sans); font-size: 14px;}

  /* Tappable word inside reading text */
  .tappable-word {
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 3px;
    padding: 0 1px;
  }
  .tappable-word:active { background: var(--accent-soft); color: var(--accent-dark); }
  .tappable-word.saved { background: var(--gold-soft); border-bottom: 2px solid var(--gold); }

  /* === Reading screen === */
  .reading-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .reading-card:active { transform: scale(0.98); }
  .reading-card-tag {
    display: inline-block;
    padding: 3px 10px;
    background: var(--blue-soft);
    color: var(--blue);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .reading-card.lit .reading-card-tag { background: var(--purple-soft); color: var(--purple); }
  .reading-card.ai .reading-card-tag { background: var(--success-soft); color: var(--success); }
  .reading-card h4 { font-family: var(--serif); font-size: 18px; margin: 4px 0; font-weight: 700; }
  .reading-card .meta { font-size: 13px; color: var(--ink-soft); }

  .reading-article {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink);
  }
  .reading-article h3 { font-family: var(--serif); margin: 18px 0 10px; font-size: 22px; }
  .reading-article p { margin: 0 0 14px; }

  .topic-pill {
    padding: 8px 14px;
    border: 1.5px solid var(--line-strong);
    border-radius: 100px;
    background: var(--bg-card);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.1s;
  }
  .topic-pill:active { background: var(--accent); color:white; border-color:var(--accent); transform: scale(0.96); }
  .topic-pills-row { display:flex; gap:8px; flex-wrap:wrap; margin: 10px 0 16px; }

  /* === Library / Resource Hub === */
  .resource-cat {
    margin-bottom: 22px;
  }
  .resource-cat-title {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .resource-item {
    display: block;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    margin-bottom: 8px;
    text-decoration: none;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.12s;
  }
  .resource-item:active { transform: scale(0.99); border-color: var(--accent); }
  .resource-item-title { font-weight: 700; font-size: 15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .resource-item-desc { font-size: 13px; color: var(--ink-soft); margin-top: 4px; line-height:1.45; }
  .resource-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    background: var(--success-soft);
    color: var(--success);
    font-weight: 700;
    margin-left: auto;
    letter-spacing: 0.04em;
  }
  .resource-tag.api { background: var(--blue-soft); color: var(--blue); }
  .resource-tag.ext { background: var(--bg-muted); color: var(--ink-soft); }

  /* AI example box */
  .ai-examples-box {
    background: var(--success-soft);
    border-left: 3px solid var(--success);
    padding: 12px 14px;
    border-radius: 0 10px 10px 0;
    margin: 10px 0;
  }
  .ai-example {
    font-family: var(--serif);
    font-size: 15px;
    margin: 6px 0;
  }
  .ai-example-ko {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  /* Confetti */
  .confetti-burst {
    position: fixed;
    top: 30%;
    left: 50%;
    width: 0;
    height: 0;
    pointer-events: none;
    z-index: 50;
  }
  .confetti-burst span {
    position: absolute;
    width: 8px;
    height: 14px;
    border-radius: 2px;
    animation: confettiFall 1.6s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translate(0, 0) rotate(0); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) rotate(720deg); opacity: 0; }
  }

  /* === Hub section card (학습 홈 — 게임/문법/미디어 진입) === */
  .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 18px 0 24px; }
  .hub-card {
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-bottom-width: 5px;
    border-radius: var(--r-lg);
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    font-family: var(--sans);
    transition: transform 0.1s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 110px;
  }
  .hub-card:active { transform: translateY(2px); border-bottom-width: 3px; }
  .hub-card .icon { font-size: 30px; line-height: 1; }
  .hub-card .title { font-weight: 700; font-size: 15px; color: var(--ink); }
  .hub-card .desc { font-size: 12px; color: var(--ink-soft); line-height: 1.35; }
  .hub-card.coral { background: linear-gradient(135deg, var(--accent-soft), #fff); border-color: var(--accent); }
  .hub-card.gold  { background: linear-gradient(135deg, var(--gold-soft), #fff);  border-color: var(--gold); }
  .hub-card.blue  { background: linear-gradient(135deg, var(--blue-soft), #fff);  border-color: var(--blue); }
  .hub-card.purple{ background: linear-gradient(135deg, var(--purple-soft), #fff);border-color: var(--purple); }

  /* === Attendance / 출석 === */
  .attendance-card {
    background: linear-gradient(135deg, #fff5da 0%, #ffe6b8 100%);
    border: 2px solid var(--gold);
    border-radius: var(--r-lg);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #d49b1a;
  }
  .attendance-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .attendance-head h3 { font-size: 16px; color: #7a5400; }
  .attendance-streak { font-weight: 700; color: #7a5400; font-size: 13px; }
  .calendar-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 12px; }
  .cal-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: rgba(255,255,255,0.5);
    font-size: 12px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .cal-cell.checked { background: var(--gold); color: white; }
  .cal-cell.today { box-shadow: 0 0 0 2px var(--accent); }
  .cal-cell.future { opacity: 0.35; }
  .checkin-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-family: var(--sans);
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--accent-dark);
  }
  .checkin-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--accent-dark); }
  .checkin-btn:disabled { background: #d4c2a3; color: white; box-shadow: 0 3px 0 #b3a17f; cursor: default; }

  /* === Gems display === */
  .stat .gem-icon { font-size: 18px; }

  /* === Rank badge === */
  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--purple-soft);
    border: 1px solid var(--purple);
    font-size: 12px;
    font-weight: 700;
    color: var(--purple);
  }

  /* === Lesson stars === */
  .lesson-stars { display: inline-flex; gap: 2px; font-size: 14px; }

  /* === Grammar === */
  .grammar-item {
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-bottom-width: 4px;
    border-radius: var(--r-md);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .grammar-item:active { transform: translateY(2px); border-bottom-width: 2px; }
  .grammar-item .level-chip {
    flex-shrink: 0;
    background: var(--accent);
    color: white;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .grammar-item.mastered .level-chip { background: var(--success); }
  .grammar-item h4 { font-family: var(--sans); font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .grammar-item .one-line { font-size: 12px; color: var(--ink-soft); }
  .grammar-item .check-mark { color: var(--success); font-size: 22px; flex-shrink: 0; }

  .grammar-section {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .grammar-section h4 { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .grammar-structure {
    background: var(--accent-soft);
    border: 1px dashed var(--accent);
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', monospace;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent-dark);
    margin: 8px 0;
    line-height: 1.5;
  }
  .grammar-example {
    padding: 10px 12px;
    background: var(--bg-muted);
    border-left: 3px solid var(--blue);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .grammar-example .en { font-weight: 600; }
  .grammar-example .ko { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

  /* === Word Game === */
  .game-stage-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .game-stage {
    aspect-ratio: 1;
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-bottom-width: 4px;
    border-radius: var(--r-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: 700;
    gap: 4px;
  }
  .game-stage.locked { background: var(--bg-muted); color: var(--ink-muted); cursor: not-allowed; }
  .game-stage.cleared { background: var(--gold-soft); border-color: var(--gold); }
  .game-stage .stage-num { font-family: var(--serif); font-size: 26px; }
  .game-stage .stage-stars { font-size: 12px; }

  .match-grid { display: grid; gap: 8px; margin: 18px 0; }
  .match-card {
    aspect-ratio: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 0 var(--accent-dark);
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    word-break: keep-all;
    line-height: 1.2;
    transition: all 0.15s;
  }
  .match-card.revealed { background: var(--bg-card); color: var(--ink); border: 2px solid var(--blue); box-shadow: 0 4px 0 #2d6da8; }
  .match-card.matched { background: var(--success); color: white; box-shadow: 0 4px 0 #208a4f; pointer-events: none; opacity: 0.85; }
  .match-card.wrong { background: var(--danger); color: white; animation: shake 0.3s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .game-hud { display: flex; justify-content: space-around; padding: 10px; background: var(--bg-muted); border-radius: 12px; margin-bottom: 14px; }
  .game-hud .item { text-align: center; }
  .game-hud .item .label { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; }
  .game-hud .item .value { font-size: 22px; font-weight: 700; font-family: var(--serif); }

  /* === Media (드라마/노래/동화) === */
  .media-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .media-tab {
    padding: 8px 14px;
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-radius: 999px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    color: var(--ink-soft);
  }
  .media-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  .media-item {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .media-item .meta-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .media-item .level-tag, .media-item .type-tag {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }
  .media-item .level-tag { background: var(--accent-soft); color: var(--accent-dark); }
  .media-item .type-tag { background: var(--blue-soft); color: var(--blue); }
  .media-item h4 { font-family: var(--sans); font-size: 15px; font-weight: 700; }
  .media-item .desc { font-size: 13px; color: var(--ink-soft); margin: 4px 0 8px; line-height: 1.4; }
  .media-item .keywords { font-size: 12px; color: var(--ink-soft); }
  .media-item .keywords strong { color: var(--accent-dark); font-weight: 700; }

  /* === Bible / 오늘의 말씀 === */
  .verse-card {
    background: linear-gradient(135deg, #fff 0%, #f5ede0 100%);
    border: 2px solid var(--gold);
    border-radius: var(--r-lg);
    padding: 22px 20px;
    margin: 14px 0 18px;
    box-shadow: 0 4px 0 #d49b1a;
  }
  .verse-ref {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 4px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    font-family: var(--sans);
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .verse-text {
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .verse-translation {
    font-size: 12px;
    color: var(--ink-muted);
    text-align: right;
    font-style: italic;
  }
  .verse-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .verse-actions button {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--line);
    background: var(--bg-card);
    border-radius: 10px;
    font-weight: 600;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    min-width: 100px;
  }
  .verse-actions button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .verse-vocab-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }
  .verse-vocab-item:last-child { border-bottom: none; }
  .verse-vocab-item .word { font-weight: 700; flex-shrink: 0; min-width: 90px; }
  .verse-vocab-item .meaning { flex: 1; font-size: 14px; color: var(--ink-soft); }
  .verse-vocab-item .save-btn {
    background: var(--bg-muted); border: none; padding: 5px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .verse-vocab-item .save-btn.saved { background: var(--success); color: white; }

  /* === Toast 강화 === */
  .toast-big {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--accent);
    color: white;
    padding: 18px 28px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 18px;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    text-align: center;
    line-height: 1.4;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- Top status bar -->
  <div class="topbar" id="topbar">
    <div class="stat" title="연속 학습일">
      <span style="font-size:20px">🔥</span>
      <span id="stat-streak">0</span>
    </div>
    <div class="stat" title="XP">
      <span style="font-size:20px">⭐</span>
      <span id="stat-xp">0</span>
    </div>
    <div class="stat" title="보석(출석/게임으로 획득)">
      <span style="font-size:20px">💎</span>
      <span id="stat-gems">0</span>
    </div>
    <div class="stat" style="margin-left:auto" title="하트(틀리면 -1)">
      <span style="font-size:20px">❤️</span>
      <span id="stat-hearts">5</span>
    </div>
  </div>

  <!-- Main content -->
  <div class="main" id="main"><!-- screens render here --></div>

  <!-- Bottom nav -->
  <div class="bottomnav" id="bottomnav">
    <button class="navbtn active" data-screen="home" onclick="nav('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      <span>학습</span>
    </button>
    <button class="navbtn" data-screen="reading" onclick="nav('reading')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>읽기</span>
    </button>
    <button class="navbtn" data-screen="chat" onclick="nav('chat')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg>
      <span>AI 대화</span>
    </button>
    <button class="navbtn" data-screen="library" onclick="nav('library')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span>자료</span>
    </button>
    <button class="navbtn" data-screen="profile" onclick="nav('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>
      <span>프로필</span>
    </button>
  </div>
</div>

<script>
/* =========================================================
   LINGO — Personal AI English Tutor (PWA)
   Single-file Android-installable app
   ========================================================= */

/* ---------- STATE / STORAGE ---------- */
const STORE_KEY = 'lingo_state_v1';
const DEFAULT_STATE = {
  user: { name: '', level: null, dailyGoal: 50, onboarded: false },
  stats: { xp: 0, streak: 0, lastStudyDate: null, hearts: 5, lastHeartRegen: Date.now(), totalLessons: 0, totalCorrect: 0, totalAttempts: 0, gems: 0 },
  progress: {}, // { unitId: { lessonsCompleted: [0,1,2], stars: { lessonIdx: 1-3 } } }
  srs: {},      // { wordKey: { interval, ease, repetitions, nextReview } }
  savedWords: [], // [{ word, definition, phonetic, ko, savedAt }]
  readingHistory: [], // [{ title, content, level, savedAt }]
  dictCache: {}, // word -> dictionary API response (cache to reduce calls)
  attendance: { lastCheckIn: null, monthDays: {}, totalCheckIns: 0 }, // monthDays: { 'YYYY-MM': [1,2,5,...] }
  wordGame: { stagesCleared: {}, highScore: 0, totalPlays: 0 }, // stagesCleared: { stageId: stars 1-3 }
  grammarProgress: {}, // { grammarId: { mastered: bool, lastReview: ts, score: 0-100 } }
  mediaSeen: {}, // { mediaId: { addedAt, notes } }
  bible: { lastReadDate: null, savedVerses: [], readDays: 0, verseCache: {}, explainCache: {}, cursor: { bookIdx: 0, chapter: 1, verse: 1 } }, // 매일 3구절씩 순차 묵상
  settings: { ttsSpeed: 0.9, apiKey: '' }
};

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const parsed = JSON.parse(raw);
    return deepMerge(JSON.parse(JSON.stringify(DEFAULT_STATE)), parsed);
  } catch(e) {
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function deepMerge(base, override) {
  for (const k in override) {
    if (override[k] && typeof override[k] === 'object' && !Array.isArray(override[k]))
      base[k] = deepMerge(base[k] || {}, override[k]);
    else base[k] = override[k];
  }
  return base;
}

/* ---------- HEART REGEN ---------- */
function tickHearts() {
  const HEART_REGEN_MS = 30 * 60 * 1000;
  const elapsed = Date.now() - state.stats.lastHeartRegen;
  const earned = Math.floor(elapsed / HEART_REGEN_MS);
  if (earned > 0 && state.stats.hearts < 5) {
    state.stats.hearts = Math.min(5, state.stats.hearts + earned);
    state.stats.lastHeartRegen = Date.now();
    saveState();
  }
}

/* ---------- STREAK ---------- */
function updateStreak() {
  const today = new Date().toDateString();
  const last = state.stats.lastStudyDate;
  if (last === today) return;
  if (last) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    state.stats.streak = (last === yesterday) ? state.stats.streak + 1 : 1;
  } else {
    state.stats.streak = 1;
  }
  state.stats.lastStudyDate = today;
  saveState();
}

          <span>${escapeHtml(c)}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function shuffleAssessment() {
  // Take 3 from each level, shuffled within level — adaptive ish
  const byLevel = { A1:[], A2:[], B1:[], B2:[] };
  ASSESSMENT_BANK.forEach(q => byLevel[q.level].push(q));
  Object.values(byLevel).forEach(arr => arr.sort(() => Math.random() - 0.5));
  return [...byLevel.A1.slice(0,3), ...byLevel.A2.slice(0,3), ...byLevel.B1.slice(0,3), ...byLevel.B2.slice(0,3)];
}

function answerAssessment(choiceIdx) {
  const q = assessState.questions[assessState.idx];
  const correct = choiceIdx === q.answer;
  document.querySelectorAll('#assess-choices .choice').forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.answer) el.classList.add('correct');
    else if (i === choiceIdx) el.classList.add('wrong');
  });
  assessState.answers.push({ level: q.level, correct });
  setTimeout(() => {
    assessState.idx++;
    render();
  }, 900);
}

function finishAssessment() {
  // Compute level: highest band with >=2/3 correct
  const scores = { A1:0, A2:0, B1:0, B2:0 };
  const counts = { A1:0, A2:0, B1:0, B2:0 };
  assessState.answers.forEach(a => {
    counts[a.level]++;
    if (a.correct) scores[a.level]++;
  });
  let level = 'A1';
  ['A1','A2','B1','B2'].forEach(lv => {
    if (counts[lv] && (scores[lv] / counts[lv]) >= 0.66) level = lv;
  });

  state.user.level = level;
  saveState();
  updateStreak();
  assessState = null;

  // Show result
  document.getElementById('main').innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">🎯</div>

/* ---------- LESSON ENGINE ---------- */
function startLesson(unitId, lessonIdx) {
  if (state.stats.hearts <= 0) {
    toast('하트가 없어요! 30분 뒤에 충전돼요 ❤️');
    return;
  }
  const unit = UNITS.find(u => u.id === unitId);
  lessonContext = {
    unit, lessonIdx,
    exercises: generateLesson(unit, lessonIdx),
    current: 0,
    correct: 0,
    wrong: 0,
    startTs: Date.now()
  };
  activeScreen = 'lesson';
  render();
}

function generateLesson(unit, lessonIdx) {
  // Take a slice of vocab (rotate by lessonIdx) and create 6-8 mixed exercises
  const vocab = [...unit.vocab].sort(() => Math.random() - 0.5).slice(0, 7);
  const exercises = [];
  const types = ['mc_ko2en', 'mc_en2ko', 'listen_choose', 'assemble', 'typing', 'mc_ko2en', 'speak'];
  types.forEach((type, i) => {
    const v = vocab[i % vocab.length];
    exercises.push(makeExercise(type, v, unit.vocab));
  });
  return exercises;
}

function makeExercise(type, target, pool) {
  const distractors = pool.filter(x => x.en !== target.en).sort(() => Math.random() - 0.5).slice(0, 3);
  switch(type) {
    case 'mc_ko2en':
      return {
        type, target,
        question: `"${target.ko}"를 영어로?`,
        choices: shuffle([target.en, ...distractors.map(d => d.en)]),
        answer: target.en
      };
    case 'mc_en2ko':
      return {
        type, target,
        question: `"${target.en}"의 뜻은?`,
        choices: shuffle([target.ko, ...distractors.map(d => d.ko)]),
        answer: target.ko
      };
    case 'listen_choose':
      return {
        type, target,
        question: '들리는 영어를 고르세요',
        playOnLoad: target.en,
        choices: shuffle([target.en, ...distractors.map(d => d.en)]),
        answer: target.en
      };
    case 'assemble': {
      const words = target.en.split(/\s+/);
      const extras = pool.flatMap(p => p.en.split(/\s+/)).filter(w => !words.includes(w));
      const allWords = shuffle([...words, ...extras.slice(0, 2)]);
      return {
        type, target,
        question: `"${target.ko}"를 영어로 만들어보세요`,
        wordBank: allWords,
        answer: target.en
      };
    }
    case 'typing':
      return {
        type, target,
        question: `"${target.ko}"를 영어로 입력하세요`,
        answer: target.en
      };
    case 'speak':
      return {
        type, target,
        question: '아래 문장을 큰 소리로 말해보세요',
        targetText: target.en,
        targetKo: target.ko,
        answer: target.en
      };
  }
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

/* ---------- Exercise interactions ---------- */
let currentSelection = null;

function pickChoice(btn) {
  document.querySelectorAll('#ex-choices .choice').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  currentSelection = btn.dataset.val;
  showCheckButton();
}

let sentenceWords = [];
function addWord(btn) {
  if (btn.classList.contains('used')) return;
  btn.classList.add('used');
  const word = btn.textContent;
  sentenceWords.push({ word, srcIdx: btn.dataset.idx });
  renderSentence();
  showCheckButton();
}
function removeWord(idx) {
  const removed = sentenceWords.splice(idx, 1)[0];
  document.querySelector(`#word-bank .word-token[data-idx="${removed.srcIdx}"]`)?.classList.remove('used');
  renderSentence();
  showCheckButton();
}
function renderSentence() {
  const sb = document.getElementById('sentence-builder');
  if (!sb) return;
  sb.innerHTML = sentenceWords.map((w, i) => `<button class="word-token" style="background:var(--accent-soft); border-color:var(--accent); color:var(--accent-dark)" onclick="removeWord(${i})">${escapeHtml(w.word)}</button>`).join('');
}

function showCheckButton() {
  if (document.getElementById('check-btn')) return;
  const ex = lessonContext.exercises[lessonContext.current];
  const isEnabled = ex.type === 'assemble' ? sentenceWords.length > 0 : true;
  const html = `<div class="feedback" id="check-btn-wrap" style="background: var(--bg); border-top: 1px solid var(--line); padding: 16px 20px calc(16px + env(safe-area-inset-bottom));">
      <button id="check-btn" class="btn" onclick="submitAnswer()" ${isEnabled ? '' : 'disabled'}>확인</button>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function submitAnswer() {
  const ex = lessonContext.exercises[lessonContext.current];
  let userAns = '';
  if (ex.type === 'mc_ko2en' || ex.type === 'mc_en2ko' || ex.type === 'listen_choose') {
    userAns = currentSelection || '';
  } else if (ex.type === 'assemble') {
    userAns = sentenceWords.map(w => w.word).join(' ');
  } else if (ex.type === 'typing') {
    userAns = document.getElementById('typing-input')?.value || '';
  }

  const isCorrect = normalize(userAns) === normalize(ex.answer);
  showFeedback(isCorrect, ex.answer, userAns);
}

function normalize(s) {
  return (s||'').toLowerCase().trim().replace(/[.,!?;:'"]/g,'').replace(/\s+/g,' ');
}

function showFeedback(correct, expected, userAns) {
  document.getElementById('check-btn-wrap')?.remove();
  if (correct) {
    lessonContext.correct++;
    state.stats.totalCorrect++;
    speak(expected);
  } else {
    lessonContext.wrong++;
    state.stats.hearts = Math.max(0, state.stats.hearts - 1);
  }
  state.stats.totalAttempts++;
  updateSrs(lessonContext.exercises[lessonContext.current].target, correct);
  saveState();
  renderTopbar();

  const html = `
    <div class="feedback ${correct ? 'correct' : 'wrong'}">
      <div class="feedback-title">${correct ? '✅ 정답!' : '❌ 다시 확인해봐요'}</div>
      <div class="feedback-detail">${correct ? '잘했어요. ' : ''}정답: <strong>${escapeHtml(expected)}</strong></div>
      <button class="btn ${correct ? 'btn-success' : 'btn-danger'}" onclick="nextExercise()">계속</button>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);

  if (state.stats.hearts === 0 && !correct) {
    setTimeout(() => toast('하트가 떨어졌어요! 30분 후 충전됩니다 ❤️'), 800);
  }
}

function nextExercise() {
  document.querySelectorAll('.feedback').forEach(el => el.remove());
  currentSelection = null;
  sentenceWords = [];
  lessonContext.current++;
  if (state.stats.hearts === 0) return exitLesson(true);
  if (lessonContext.current >= lessonContext.exercises.length) return finishLesson();
  render();
}

function finishLesson() {
  const total = lessonContext.exercises.length;
  const acc = lessonContext.correct / total;
  let stars = 1;
  if (acc >= 0.95) stars = 3;
  else if (acc >= 0.75) stars = 2;
  const xpEarned = lessonContext.correct * 10 + (lessonContext.wrong === 0 ? 10 : 0) + stars * 5;
  state.stats.xp += xpEarned;
  state.stats.totalLessons++;
  const progress = state.progress[lessonContext.unit.id] ||= { lessonsCompleted: [], stars: {} };
  progress.stars = progress.stars || {};
  if (!progress.lessonsCompleted.includes(lessonContext.lessonIdx)) {
    progress.lessonsCompleted.push(lessonContext.lessonIdx);
  }
  progress.stars[lessonContext.lessonIdx] = Math.max(progress.stars[lessonContext.lessonIdx] || 0, stars);
  // 별 3개 시 보석 1개 보너스
  if (stars === 3) state.stats.gems = (state.stats.gems || 0) + 1;
  updateStreak();
  saveState();

  activeScreen = 'lesson-result';
  lessonContext.xpEarned = xpEarned;
  lessonContext.stars = stars;
  render();
  burstConfetti();
}

/* ---------- SRS (SuperMemo SM-2 simplified) ---------- */
function updateSrs(vocab, correct) {
  if (!vocab) return;
  const key = vocab.en;
  let card = state.srs[key] || { interval: 0, ease: 2.5, reps: 0, nextReview: Date.now() };
  if (correct) {
    card.reps++;
    if (card.reps === 1) card.interval = 1;
    else if (card.reps === 2) card.interval = 3;
    else card.interval = Math.round(card.interval * card.ease);
    card.ease = Math.max(1.3, card.ease + 0.1);
  } else {
    card.reps = 0;
    card.interval = 1;
    card.ease = Math.max(1.3, card.ease - 0.2);
  }
  card.nextReview = Date.now() + card.interval * 86400000;
  state.srs[key] = card;
}

/* ---------- TTS / STT (Web Speech API) ---------- */
function speak(text) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = state.settings.ttsSpeed || 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch(e) { console.warn('TTS failed', e); }
}

let recognition = null;
let isRecording = false;
function toggleMic() {
  const ex = lessonContext?.exercises[lessonContext.current];
  if (!ex) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    toast('이 기기는 음성 인식을 지원하지 않아요');
    return skipSpeak();
  }
  if (isRecording) { recognition?.stop(); return; }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-status').textContent = '듣고 있어요... 말해보세요';
  };
  recognition.onresult = (e) => {
    const heard = e.results[0][0].transcript;
    document.getElementById('mic-status').textContent = `들린 말: "${heard}"`;
    setTimeout(() => {
      const correct = normalize(heard).includes(normalize(ex.answer).split(' ')[0]) ||
                      similarity(normalize(heard), normalize(ex.answer)) > 0.6;
      showFeedback(correct, ex.answer, heard);
    }, 700);
  };
  recognition.onerror = (e) => {
    document.getElementById('mic-status').textContent = '인식 실패. 다시 시도해보세요.';
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn')?.classList.remove('recording');
  };
  recognition.start();
}

function skipSpeak() {
  const ex = lessonContext.exercises[lessonContext.current];
  showFeedback(true, ex.answer, '(건너뜀)');
}

function similarity(a, b) {
  if (a === b) return 1;
  const longer = a.length > b.length ? a : b;
  const shorter = a.length > b.length ? b : a;
  if (longer.length === 0) return 1;
  return (longer.length - editDistance(longer, shorter)) / longer.length;
}
function editDistance(a, b) {
  const dp = Array.from({length: a.length+1}, () => new Array(b.length+1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[a.length][b.length];
}

async function sendChat() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  chatHistory.push({ role: 'user', content: text });
  renderChatMessages();

  const loader = document.getElementById('chat-loading');
  if (loader) loader.style.display = 'block';

  let reply = await callClaude(text);
  if (loader) loader.style.display = 'none';

  chatHistory.push({ role: 'assistant', content: reply.en, ko: reply.ko });
  renderChatMessages();
  // award small XP for practicing
  state.stats.xp += 2;
  saveState();
  renderTopbar();

async function callClaude(userMessage) {
  if (!state.settings.apiKey) {
    // Fallback: canned reply
    return {
      en: `That's interesting! Tell me more. (Tip: add your API key in Settings for real conversation.)`,
      ko: `흥미롭네요! 더 얘기해주세요. (실제 대화를 위해 설정에서 API 키를 입력해주세요.)`
    };
  }
  try {
    const systemPrompt = `You are a warm, encouraging English tutor for a Korean learner at CEFR ${state.user.level} level. Reply in TWO parts in plain JSON only (no markdown, no code fences):
{"en": "your English reply, max 2 sentences, simple words appropriate for ${state.user.level}", "ko": "Korean translation of the English reply"}
Be conversational, ask follow-up questions, gently correct major errors (mention briefly in the ko part). Stay encouraging.`;

    const messages = [
      ...chatHistory.slice(-10).filter(m => m.role !== 'system').map(m => ({
        role: m.role,
        content: m.content
      }))
    ];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: systemPrompt,
        messages: messages
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      console.warn('API error', errText);
      return { en: `(API error - check your key in Settings)`, ko: `(API 오류 - 설정에서 키를 확인하세요)` };
    }
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    try {
      // Strip markdown fences if any
      const cleaned = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      return { en: parsed.en || text, ko: parsed.ko || '' };
    } catch(e) {
      return { en: text, ko: '' };
    }
  } catch(e) {
    console.error(e);

/* ---------- RANK ---------- */
const RANKS = [
  { name: '병아리', min: 0,     icon: '🐣' },
  { name: '참새',   min: 100,   icon: '🐦' },
  { name: '비둘기', min: 300,   icon: '🕊️' },
  { name: '독수리', min: 700,   icon: '🦅' },
  { name: '용',     min: 1500,  icon: '🐲' },
  { name: '불사조', min: 3000,  icon: '🔥' },
  { name: '신화',   min: 6000,  icon: '🌟' }
];
function currentRank(xp) {
  let r = RANKS[0];
  for (const x of RANKS) if (xp >= x.min) r = x;
  return r;
}
function nextRank(xp) {
  return RANKS.find(r => r.min > xp);
}

/* ---------- WORD TAP-TO-DEFINE (Free Dictionary API) ---------- */
/* Source: https://dictionaryapi.dev — CORS enabled, Wiktionary-based */
async function fetchDictionary(word) {
  const key = word.toLowerCase().replace(/[^a-z'-]/g, '');
  if (!key) return null;
  // Cache check (avoid hammering API)
  if (state.dictCache[key]) return state.dictCache[key];
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
    if (!res.ok) return { notFound: true, word: key };
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) return { notFound: true, word: key };
    const entry = data[0];
    const simplified = {
      word: entry.word,
      phonetic: entry.phonetic || entry.phonetics?.find(p => p.text)?.text || '',
      audio: entry.phonetics?.find(p => p.audio)?.audio || '',
      meanings: (entry.meanings || []).slice(0, 3).map(m => ({
        pos: m.partOfSpeech,
        defs: (m.definitions || []).slice(0, 2).map(d => ({
          definition: d.definition,
          example: d.example || ''
        }))
      }))
    };
    // Cache (cap at 200 entries)
    const keys = Object.keys(state.dictCache);
    if (keys.length > 200) delete state.dictCache[keys[0]];
    state.dictCache[key] = simplified;
    saveState();
    return simplified;
  } catch(e) {
    console.warn('Dictionary fetch failed', e);
    return { notFound: true, word: key, error: true };
  }
}

async function showDefinition(word) {

  document.querySelectorAll('.define-overlay').forEach(el => el.remove());

    <div class="define-card">
      <div class="define-header">

          <div class="define-word">${escapeHtml(cleaned)}</div>

        </div>
        <button onclick="closeDefine()" style="background:none;border:none;font-size:28px;color:var(--ink-muted);cursor:pointer;line-height:1;padding:0 6px">×</button>
      </div>
      <div style="text-align:center; padding: 20px"><div class="dots"><span></span><span></span><span></span></div></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const entry = await fetchDictionary(cleaned);

      </div>
      <div class="define-actions">
        <button onclick="speak('${escapeAttr(cleaned)}'); event.stopPropagation();" style="background:var(--blue-soft); color:var(--blue);">🔊 발음</button>
        <button onclick="saveWord('${escapeAttr(cleaned)}', '${escapeAttr(aiTrans || '')}', ''); closeDefine();" style="background:var(--gold-soft); color:#996f00;">⭐ 저장</button>
      </div>
    `;

  }
  const firstMeaning = entry.meanings[0];
  const firstDef = firstMeaning?.defs?.[0]?.definition || '';
  card.innerHTML = `
    <div class="define-header">
      <div>
        <div class="define-word">${escapeHtml(entry.word)}</div>
        ${entry.phonetic ? `<div class="define-phonetic">${escapeHtml(entry.phonetic)}</div>` : ''}
      </div>
      <button onclick="closeDefine()" style="background:none;border:none;font-size:28px;color:var(--ink-muted);cursor:pointer;line-height:1;padding:0 6px">×</button>
    </div>
    ${entry.meanings.map(m => `
      <div class="define-pos">${escapeHtml(m.pos)}</div>
      ${m.defs.map(d => `
        <div class="define-meaning">${escapeHtml(d.definition)}</div>
        ${d.example ? `<div class="define-example">"${escapeHtml(d.example)}"</div>` : ''}
      `).join('')}
    `).join('')}
    <div id="ai-examples-slot"></div>
    <div class="define-actions">
      <button onclick="speakAudio('${escapeAttr(entry.audio)}', '${escapeAttr(entry.word)}'); event.stopPropagation();" style="background:var(--blue-soft); color:var(--blue);">🔊 발음</button>
      <button onclick="generateExamples('${escapeAttr(entry.word)}'); event.stopPropagation();" style="background:var(--purple-soft); color:var(--purple);">💡 AI 예문</button>
      <button onclick="saveWord('${escapeAttr(entry.word)}', '${escapeAttr(firstDef)}', '${escapeAttr(entry.phonetic)}'); closeDefine();" style="background:var(--gold-soft); color:#996f00;">⭐ 저장</button>
    </div>
  `;
}

function closeDefine() {
  document.querySelectorAll('.define-overlay').forEach(el => el.remove());
}

function speakAudio(audioUrl, fallbackText) {
  if (audioUrl) {
    try {
      const audio = new Audio(audioUrl);
      audio.play().catch(() => speak(fallbackText));
      return;
    } catch(e) { /* fall through */ }
  }
  speak(fallbackText);
}

function saveWord(word, definition, phonetic) {
  if (!state.savedWords) state.savedWords = [];
  if (state.savedWords.some(w => w.word === word)) {
    toast(`"${word}"는 이미 저장돼 있어요`);
    return;
  }
  state.savedWords.push({
    word, definition: definition || '', phonetic: phonetic || '',
    savedAt: Date.now()
  });
  // Also add to SRS queue so it shows up in review
  updateSrs({ en: word, ko: definition }, false);
  saveState();
  toast(`⭐ "${word}" 저장됨 — 복습 큐에 추가됨`);
}

/* Wrap English text so each word is tappable */
function makeTappableText(text) {
  return escapeHtml(text).split(/(\s+)/).map(part => {
    if (/^\s+$/.test(part)) return part;
    // Extract pure word from punctuation
    const m = part.match(/^([^A-Za-z']*)([A-Za-z'-]+)(.*)$/);
    if (!m) return part;
    const [, pre, word, post] = m;
    const isSaved = state.savedWords?.some(w => w.word.toLowerCase() === word.toLowerCase());
    return `${pre}<span class="tappable-word${isSaved ? ' saved' : ''}" onclick="showDefinition('${escapeAttr(word)}')">${word}</span>${post}`;
  }).join('');
}

/* ---------- AI EXAMPLE SENTENCES (Tatoeba replacement) ---------- */
/* Tatoeba has CORS restrictions for browser use, so we use Claude API
   to generate level-appropriate example sentences on demand */
async function generateExamples(word) {
  const slot = document.getElementById('ai-examples-slot');
  if (!slot) return;
  if (!state.settings.apiKey) {
    slot.innerHTML = `<div style="padding:12px; background:var(--gold-soft); border-radius:10px; margin-top:10px; font-size:14px">💡 AI 예문 기능은 설정에서 API 키 입력 후 사용 가능합니다.</div>`;
    return;
  }
  slot.innerHTML = `<div style="padding:12px; text-align:center"><div class="dots"><span></span><span></span><span></span></div></div>`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 400,
        system: `You generate 3 example sentences for a Korean English learner at CEFR ${state.user.level} level. Reply ONLY in JSON (no markdown): {"examples":[{"en":"sentence using the word","ko":"Korean translation"}]}`,
        messages: [{ role: 'user', content: `Generate 3 short, natural example sentences using the word "${word}" appropriate for ${state.user.level} level. Each under 12 words.` }]
      })
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    slot.innerHTML = `
      <div class="ai-examples-box">
        <div style="font-size:11px; font-weight:700; color:var(--success); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px">AI 생성 예문 (Tatoeba 스타일)</div>
        ${parsed.examples.map(ex => `
          <div class="ai-example">${makeTappableText(ex.en)}</div>
          <div class="ai-example-ko">${escapeHtml(ex.ko)}</div>
        `).join('')}
      </div>
    `;
  } catch(e) {
    slot.innerHTML = `<div style="padding:10px; font-size:13px; color:var(--ink-soft)">예문 생성 실패. 다시 시도해보세요.</div>`;
  }
}

/* AI translation of single word (when dictionary fails) */
async function aiTranslateWord(word) {
  if (!state.settings.apiKey) return null;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 100,
        messages: [{ role: 'user', content: `Translate "${word}" to Korean. Reply ONLY with the Korean translation, no explanation.` }]
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return (data.content?.[0]?.text || '').trim();
  } catch(e) { return null; }
}

async function generateReadingArticle(topicEn, topicKo) {
  if (!state.settings.apiKey) {
    toast('설정에서 Anthropic API 키를 먼저 입력해주세요');
    return;
  }
  // Loading screen
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:24px">
      <button class="close-btn" onclick="nav('reading')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <strong>${topicKo} 글 생성 중...</strong>
    </div>
    <div style="text-align:center; padding: 60px 20px">
      <div class="dots" style="margin-bottom:20px"><span></span><span></span><span></span></div>
      <p style="color:var(--ink-soft)">AI가 ${state.user.level} 레벨의 글을 작성하고 있어요</p>
    </div>
  `;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.settings.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        system: `Generate a short English reading passage for a Korean learner at CEFR ${state.user.level} level. Use vocabulary and sentence structures appropriate for that level. Reply ONLY in JSON: {"title":"engaging title","content":"3-4 paragraphs separated by \\n\\n","summary_ko":"한 줄 한국어 요약"}`,
        messages: [{ role: 'user', content: `Write a ${state.user.level} level reading passage about: ${topicEn}. Approx 150-250 words. Make it engaging and useful for vocabulary learning.` }]
      })
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);

    const article = {
      title: parsed.title,
      content: parsed.content,
      summary: parsed.summary_ko || '',
      level: state.user.level,
      source: 'AI',
      topic: topicKo,
      savedAt: Date.now()
    };
    state.readingHistory = state.readingHistory || [];
    state.readingHistory.push(article);
    if (state.readingHistory.length > 20) state.readingHistory.shift();
    saveState();
    currentReadingArticle = article;
    activeScreen = 'reading-view';
    render();
  } catch(e) {
    toast('글 생성 실패. API 키 또는 네트워크를 확인하세요.');
    setTimeout(() => nav('reading'), 1000);
  }
}

async function openClassic(bookId, title, author) {
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:24px">
      <button class="close-btn" onclick="nav('reading')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <strong>${escapeHtml(title)} 불러오는 중...</strong>
    </div>
    <div style="text-align:center; padding: 60px 20px"><div class="dots"><span></span><span></span><span></span></div></div>
  `;

  // Try AI-simplified version first (most reliable, level-appropriate)
  if (state.settings.apiKey) {
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.settings.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 800,
          system: `You produce a simplified excerpt of a classic English novel for a CEFR ${state.user.level} Korean learner. Reply ONLY in JSON: {"content":"3-4 short paragraphs of the opening, simplified vocabulary appropriate for ${state.user.level}","summary_ko":"한국어 요약 1-2 문장"}`,
          messages: [{ role: 'user', content: `Produce a ${state.user.level}-level simplified version of the opening of "${title}" by ${author} (Project Gutenberg #${bookId}). Keep the story's spirit, simplify vocabulary and grammar for the learner.` }]
        })
      });
      if (res.ok) {
        const data = await res.json();
        const text = (data.content?.[0]?.text || '').replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(text);
        const article = {
          title: `${title} (간소화 버전)`,
          content: parsed.content,
          summary: parsed.summary_ko || '',
          level: state.user.level,
          source: 'Gutenberg + AI',
          author,
          gutenbergUrl: `https://www.gutenberg.org/ebooks/${bookId}`,
          savedAt: Date.now()
        };
        state.readingHistory = state.readingHistory || [];
        state.readingHistory.push(article);
        if (state.readingHistory.length > 20) state.readingHistory.shift();
        saveState();
        currentReadingArticle = article;
        activeScreen = 'reading-view';
        render();
        return;
      }
    } catch(e) { /* fall through to link */ }
  }
  // Fallback: external link
  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:24px">
      <button class="close-btn" onclick="nav('reading')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <strong>${escapeHtml(title)}</strong>
    </div>
    <div class="card">
      <h3>${escapeHtml(title)}</h3>
      <p class="subtitle">${escapeHtml(author)}</p>
      <p style="margin-top:14px">AI 간소화 기능을 사용하려면 설정에서 API 키를 입력하세요. 또는 아래 버튼으로 원문을 외부에서 열 수 있어요.</p>
      <a href="https://www.gutenberg.org/ebooks/${bookId}" target="_blank" rel="noopener">
        <button class="btn" style="margin-top:14px">📖 Project Gutenberg에서 열기</button>
      </a>
    </div>
  `;
}

function openSavedReading(idx) {
  currentReadingArticle = state.readingHistory[idx];
  activeScreen = 'reading-view';
  render();
}

function renderReadingView() {
  const art = currentReadingArticle;
  if (!art) { nav('reading'); return; }
  const paragraphs = (art.content || '').split(/\n\n+/).filter(Boolean);

  document.getElementById('main').innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:18px">
      <button class="close-btn" onclick="nav('reading')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div style="flex:1">
        <div style="font-size:11px; color:var(--ink-muted); font-weight:700; letter-spacing:0.06em; text-transform:uppercase">${escapeHtml(art.source || 'AI')} · ${escapeHtml(art.level)}</div>
      </div>
      <button onclick="readAloudArticle()" class="close-btn" title="전체 듣기">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>
    </div>

    <div class="reading-article">
      <h3>${escapeHtml(art.title)}</h3>
      ${art.summary ? `<p style="font-style:italic; color:var(--ink-soft); padding:10px 14px; background:var(--bg-muted); border-radius:10px; font-size:14px; margin-bottom:14px">📝 ${escapeHtml(art.summary)}</p>` : ''}
      ${paragraphs.map(p => `<p>${makeTappableText(p)}</p>`).join('')}
    </div>

    <p style="margin-top:24px; padding: 14px; background: var(--blue-soft); border-radius:12px; font-size:13px; color:var(--ink-soft); text-align:center">
      💡 단어를 <strong>탭</strong>하면 사전이 열려요. ⭐로 저장하면 SRS 복습 큐에 추가됩니다.
    </p>

    ${art.gutenbergUrl ? `<a href="${art.gutenbergUrl}" target="_blank" rel="noopener" style="display:block; text-align:center; margin-top:14px; color:var(--ink-soft); font-size:13px; text-decoration:underline">📚 원문 전체 보기 (Project Gutenberg)</a>` : ''}
  `;

  // Award reading XP
  state.stats.xp += 5;
  updateStreak();
  saveState();
  renderTopbar();
}

function readAloudArticle() {
  const art = currentReadingArticle;
  if (!art) return;
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    toast('재생 중지');
    return;
  }
  // Read paragraph by paragraph
  const paras = (art.content || '').split(/\n\n+/).filter(Boolean);
  paras.forEach((p, i) => {
    const u = new SpeechSynthesisUtterance(p);
    u.lang = 'en-US';
    u.rate = state.settings.ttsSpeed || 0.9;
    speechSynthesis.speak(u);
  });
  toast('🔊 전체 읽기 시작');
}

function saveApiKey() {

/* ---------- UTILITIES ---------- */
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

function burstConfetti() {
  const colors = ['#ff6b3d', '#2dab66', '#f4b942', '#4a90d9', '#7c4dff'];
  for (let i = 0; i < 30; i++) {
    const sp = document.createElement('span');
    sp.className = 'confetti-burst-piece';
    sp.style.position = 'fixed';
    sp.style.top = '30%';
    sp.style.left = '50%';
    sp.style.width = '8px';
    sp.style.height = '14px';
    sp.style.borderRadius = '2px';
    sp.style.background = colors[i % colors.length];
    sp.style.pointerEvents = 'none';
    sp.style.zIndex = 50;
    sp.style.setProperty('--dx', `${(Math.random() - 0.5) * 400}px`);
    sp.style.setProperty('--dy', `${Math.random() * 400 + 200}px`);
    sp.style.animation = 'confettiFall 1.6s ease-out forwards';
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1800);
  }
}

/* =========================================================
   ATTENDANCE / 출석 시스템 — 매일 보석/하트 보상
   ========================================================= */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function alreadyCheckedInToday() {
  return state.attendance.lastCheckIn === todayKey();
}

function checkInToday() {
  if (alreadyCheckedInToday()) { toast('오늘은 이미 출석했어요 🌟'); return; }
  const tk = todayKey();
  const mk = monthKey();
  state.attendance.lastCheckIn = tk;
  state.attendance.monthDays[mk] = state.attendance.monthDays[mk] || [];
  const day = new Date().getDate();
  if (!state.attendance.monthDays[mk].includes(day)) {
    state.attendance.monthDays[mk].push(day);
  }
  state.attendance.totalCheckIns = (state.attendance.totalCheckIns || 0) + 1;

  // 기본 보상
  const gemReward = 1;
  let xpReward = 5;
  let heartReward = 0;
  let bonusMsg = '';

  // 연속 출석 마일스톤
  const n = state.attendance.totalCheckIns;
  if (n % 30 === 0)      { state.stats.gems += 30; bonusMsg = `🎉 ${n}일 출석! 보석 +30`; }
  else if (n % 14 === 0) { state.stats.gems += 10; heartReward = 5; bonusMsg = `🎉 ${n}일 출석! 보석 +10, 하트 풀충전`; }
  else if (n % 7 === 0)  { state.stats.gems += 5;  bonusMsg = `🎉 ${n}일 출석! 보석 +5`; }

  state.stats.gems = (state.stats.gems || 0) + gemReward;
  state.stats.xp += xpReward;
  if (heartReward) state.stats.hearts = Math.min(5, state.stats.hearts + heartReward);
  saveState();
  bigToast(`✅ 출석 완료!\n+${xpReward} XP · +${gemReward}💎${bonusMsg ? '\n' + bonusMsg : ''}`);
  setTimeout(() => render(), 2200);
}

function renderAttendanceCard() {
  const mk = monthKey();
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const today = now.getDate();
  const checked = state.attendance.monthDays[mk] || [];
  let cellsHtml = '';
  // 주별 헤더 한 줄 (요일)
  ['일','월','화','수','목','금','토'].forEach(d => {
    cellsHtml += `<div class="cal-cell" style="background:transparent;font-size:11px;color:var(--ink-muted)">${d}</div>`;
  });
  // 첫 주 빈칸
  const firstDow = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  for (let i = 0; i < firstDow; i++) cellsHtml += `<div class="cal-cell" style="background:transparent"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const cls = [
      'cal-cell',
      checked.includes(d) ? 'checked' : '',
      d === today ? 'today' : '',
      d > today ? 'future' : ''
    ].join(' ');
    cellsHtml += `<div class="${cls}">${checked.includes(d) ? '✓' : d}</div>`;
  }
  const done = alreadyCheckedInToday();
  const total = state.attendance.totalCheckIns || 0;
  return `
    <div class="attendance-card">
      <div class="attendance-head">
        <h3>📅 ${now.getMonth()+1}월 출석</h3>
        <span class="attendance-streak">총 ${total}일 출석</span>
      </div>
      <div class="calendar-row">${cellsHtml}</div>
      <button class="checkin-btn" onclick="checkInToday()" ${done ? 'disabled' : ''}>
        ${done ? '✅ 오늘 출석 완료' : '🎁 오늘 출석하고 보석 받기'}
      </button>
    </div>
  `;
}

function bigToast(msg) {
  document.querySelectorAll('.toast-big').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast-big';
  el.innerText = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
  burstConfetti();
}

function renderGrammar() {
  const byLevel = { A1: [], A2: [], B1: [], B2: [] };
  GRAMMAR_LESSONS.forEach(g => { byLevel[g.level].push(g); });
  const sectionHtml = Object.entries(byLevel).map(([lv, items]) => {
    if (!items.length) return '';
    const itemsHtml = items.map(g => {
      const mastered = state.grammarProgress[g.id]?.mastered;
      return `
        <div class="grammar-item ${mastered ? 'mastered' : ''}" onclick="openGrammar('${g.id}')">
          <span class="level-chip">${g.level}</span>
          <div style="flex:1;min-width:0">
            <h4>${escapeHtml(g.title)}</h4>
            <div class="one-line">${escapeHtml(g.concept.slice(0, 50))}${g.concept.length > 50 ? '…' : ''}</div>
          </div>
          ${mastered ? '<span class="check-mark">✓</span>' : ''}
        </div>
      `;
    }).join('');
    return `<h3 style="margin: 20px 0 10px">${lv} <span style="font-size:13px;color:var(--ink-soft);font-family:var(--sans);font-weight:600">· ${levelLabel(lv)}</span></h3>${itemsHtml}`;
  }).join('');
  const total = GRAMMAR_LESSONS.length;
  const done = Object.values(state.grammarProgress).filter(p => p.mastered).length;
  document.getElementById('main').innerHTML = `
    <h2 style="margin-bottom:6px">📐 문법 학습</h2>
    <p class="subtitle" style="margin-bottom:14px">기초부터 단계별로 · ${done}/${total} 완료</p>
